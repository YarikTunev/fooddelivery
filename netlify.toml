[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "http://fooddelivery.s99220rx.beget.tech/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/images/*"
  to = "http://fooddelivery.s99220rx.beget.tech/images/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
